<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storno bitte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111110;
    --bg2: #1a1a18;
    --bg3: #242422;
    --border: rgba(255,255,255,0.07);
    --border-h: rgba(255,255,255,0.14);
    --text: #e8e6e0;
    --text-2: #8a8880;
    --text-3: #3d3d3a;
    --accent: #c8a96e;
    --accent-bg: rgba(200,169,110,0.1);
    --red: #c0504a;
    --red-bg: rgba(192,80,74,0.12);
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
    --gap: 3px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.025; pointer-events: none; z-index: 9999;
  }

  /* ── LOGIN ─────────────────────────────────────────── */
  #loginScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 900;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #loginScreen.out { opacity: 0; transform: translateY(-16px); pointer-events: none; }

  .login-logo { font-family: var(--serif); font-size: 48px; letter-spacing: -1px; margin-bottom: 4px; }
  .login-logo em { color: var(--accent); font-style: italic; }
  .login-hint { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-3); margin-bottom: 44px; }

  .login-field { display: flex; flex-direction: column; gap: 8px; width: 260px; }

  .login-pw {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 14px;
    padding: 13px 16px; outline: none; text-align: center;
    letter-spacing: 4px; transition: border-color 0.2s;
  }
  .login-pw::placeholder { letter-spacing: 1px; color: var(--text-3); font-size: 13px; }
  .login-pw:focus { border-color: var(--accent); }

  .login-go {
    background: var(--accent); color: #111; border: none;
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    letter-spacing: 2.5px; text-transform: uppercase;
    padding: 13px; cursor: pointer; transition: opacity 0.15s;
  }
  .login-go:hover { opacity: 0.82; }

  .login-err { font-size: 12px; color: #b06060; text-align: center; opacity: 0; transition: opacity 0.2s; letter-spacing: 0.5px; }
  .login-err.on { opacity: 1; }

  /* ── APP ─────────────────────────────────────────────── */
  #app { display: none; animation: fadeIn 0.5s ease; }
  #app.on { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── HEADER ──────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(17,17,16,0.9); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    height: 58px; display: flex; align-items: center;
    padding: 0 20px; gap: 16px;
  }
  .h-logo { font-family: var(--serif); font-size: 20px; letter-spacing: -0.5px; flex: 1; }
  .h-logo em { color: var(--accent); font-style: italic; }
  .h-avatars { display: flex; gap: 5px; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg3); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; color: var(--text-2);
    cursor: default; transition: border-color 0.15s, color 0.15s;
  }
  .avatar:hover { border-color: var(--accent); color: var(--accent); }
  .h-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); font-family: var(--sans); font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 7px 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .h-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── FILTERS ─────────────────────────────────────────── */
  .filters {
    display: flex; gap: 6px; padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .f-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); font-family: var(--sans); font-size: 11px;
    padding: 5px 14px; cursor: pointer; white-space: nowrap;
    transition: all 0.15s; letter-spacing: 0.5px; border-radius: 999px;
  }
  .f-btn:hover, .f-btn.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  /* ── GRID ─────────────────────────────────────────────── */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); padding: var(--gap); }

  .tile { aspect-ratio: 1; position: relative; overflow: hidden; background: var(--bg2); cursor: pointer; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease, filter 0.3s; filter: brightness(0.9); }
  .tile:hover img { transform: scale(1.04); filter: brightness(0.72); }

  .tile-badge {
    position: absolute; top: 8px; right: 8px;
    width: 22px; height: 22px; background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; z-index: 2;
  }

  .tile-hover {
    position: absolute; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px; opacity: 0; transition: opacity 0.25s; z-index: 1;
  }
  .tile:hover .tile-hover { opacity: 1; }
  .tile-hover-title { font-family: var(--serif); font-size: 15px; text-align: center; color: white; line-height: 1.3; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  .tile-hover-date { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; letter-spacing: 0.5px; }

  .tile.audio-tile {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; background: var(--bg3); border: 1px solid var(--border);
  }
  .audio-icon { font-size: 28px; opacity: 0.4; transition: opacity 0.2s; }
  .tile.audio-tile:hover .audio-icon { opacity: 0.8; }
  .audio-title { font-size: 11px; color: var(--text-3); text-align: center; padding: 0 12px; line-height: 1.4; transition: color 0.2s; }
  .tile.audio-tile:hover .audio-title { color: var(--text-2); }
  .audio-dur { font-size: 10px; color: var(--accent); opacity: 0.6; font-family: monospace; }

  .grid-empty { grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--text-3); font-size: 13px; letter-spacing: 1px; }

  /* ── DETAIL OVERLAY ───────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .overlay.on { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    width: 100%; max-width: 860px; max-height: 90vh; overflow-y: auto;
    display: grid; grid-template-columns: 1fr 1fr;
    transform: scale(0.96); transition: transform 0.3s;
    scrollbar-width: thin; scrollbar-color: var(--bg3) transparent;
  }
  .overlay.on .modal { transform: scale(1); }

  .modal-media {
    position: relative; background: #000;
    min-height: 320px; display: flex; align-items: center; justify-content: center;
  }
  .modal-media img { width: 100%; height: 100%; object-fit: contain; display: block; max-height: 70vh; }
  .modal-media.audio-panel { flex-direction: column; gap: 16px; background: var(--bg3); padding: 40px 30px; }
  .modal-audio-icon { font-size: 48px; opacity: 0.3; }
  .modal-audio-player { width: 100%; accent-color: var(--accent); }

  .modal-body { display: flex; flex-direction: column; padding: 28px 24px; gap: 16px; overflow-y: auto; }

  .modal-top {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .modal-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: var(--text-2); flex-shrink: 0;
  }
  .modal-meta { flex: 1; }
  .modal-author { font-size: 13px; font-weight: 500; }
  .modal-date { font-size: 11px; color: var(--text-2); margin-top: 1px; }
  .modal-tag { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); background: var(--accent-bg); padding: 3px 10px; border-radius: 2px; }
  .modal-close { background: transparent; border: none; color: var(--text-2); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }

  .modal-title { font-family: var(--serif); font-size: 26px; letter-spacing: -0.5px; line-height: 1.2; }
  .modal-desc { font-size: 14px; line-height: 1.75; color: rgba(232,230,224,0.6); }

  /* ── COMMENTS ─────────────────────────────────────────── */
  .comments-area { display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; }
  .c-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); }

  .comment { display: flex; gap: 9px; align-items: flex-start; }
  .c-av {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border);
    font-size: 9px; font-weight: 500; color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .c-name { font-size: 11px; font-weight: 500; color: var(--text-2); margin-bottom: 2px; }
  .c-text { font-size: 13px; color: rgba(232,230,224,0.55); line-height: 1.5; }

  /* audio comment player */
  .c-audio-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 2px; margin-top: 2px;
  }
  .c-play-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-bg); border: 1px solid var(--accent);
    color: var(--accent); font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: background 0.15s;
  }
  .c-play-btn:hover { background: var(--accent); color: #111; }
  .c-waveform {
    flex: 1; height: 24px;
    display: flex; align-items: center; gap: 2px;
  }
  .c-waveform-bar {
    flex: 1; background: var(--border-h);
    border-radius: 1px; min-width: 2px;
    transition: background 0.15s;
  }
  .c-audio-dur { font-size: 11px; color: var(--text-3); font-family: monospace; flex-shrink: 0; }

  /* ── COMMENT INPUT AREA ───────────────────────────────── */
  .add-c {
    border-top: 1px solid var(--border);
    padding-top: 14px; margin-top: auto;
    display: flex; flex-direction: column; gap: 8px;
  }

  .add-c-row { display: flex; gap: 8px; align-items: center; }

  .c-input {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border); color: var(--text);
    font-family: var(--sans); font-size: 13px; font-weight: 300;
    padding: 9px 12px; outline: none; transition: border-color 0.2s;
  }
  .c-input:focus { border-color: var(--border-h); }
  .c-input::placeholder { color: var(--text-3); }

  .c-send {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); font-size: 14px;
    width: 38px; height: 38px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .c-send:hover { border-color: var(--accent); color: var(--accent); }

  /* ── VOICE RECORD BUTTON ──────────────────────────────── */
  .voice-btn {
    width: 38px; height: 38px; flex-shrink: 0;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.15s; position: relative;
  }
  .voice-btn:hover { border-color: var(--accent); color: var(--accent); }
  .voice-btn.recording {
    background: var(--red-bg); border-color: var(--red);
    color: var(--red); animation: recPulse 1s ease-in-out infinite;
  }
  @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,80,74,0.4); } 50% { box-shadow: 0 0 0 6px rgba(192,80,74,0); } }

  /* recording status bar */
  .rec-status {
    display: none; align-items: center; gap: 8px;
    font-size: 12px; color: var(--red); letter-spacing: 0.5px;
  }
  .rec-status.on { display: flex; }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: recPulse 1s ease-in-out infinite; }
  .rec-timer { font-family: monospace; font-size: 12px; color: var(--text-2); margin-left: auto; }

  /* voice preview (before sending) */
  .voice-preview {
    display: none; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 8px 12px;
  }
  .voice-preview.on { display: flex; }
  .vp-label { font-size: 12px; color: var(--text-2); flex: 1; }
  .vp-send {
    background: var(--accent); color: #111; border: none;
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 7px 14px; cursor: pointer; transition: opacity 0.15s;
  }
  .vp-send:hover { opacity: 0.82; }
  .vp-discard {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); font-size: 11px; padding: 7px 10px; cursor: pointer;
    transition: all 0.15s;
  }
  .vp-discard:hover { border-color: var(--red); color: var(--red); }

  /* ── UPLOAD OVERLAY ───────────────────────────────────── */
  .up-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px); z-index: 300;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .up-overlay.on { opacity: 1; pointer-events: all; }
  .up-modal {
    background: var(--bg2); border: 1px solid var(--border);
    width: 100%; max-width: 460px; padding: 36px;
    transform: translateY(12px); transition: transform 0.3s;
    max-height: 90vh; overflow-y: auto;
  }
  .up-overlay.on .up-modal { transform: translateY(0); }
  .up-title { font-family: var(--serif); font-size: 26px; letter-spacing: -0.5px; margin-bottom: 4px; }
  .up-sub { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }

  .drop-zone {
    border: 1px dashed var(--border-h); padding: 28px 20px;
    text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s; margin-bottom: 16px;
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: var(--accent-bg); }
  .drop-icon { font-size: 24px; margin-bottom: 8px; }
  .drop-text { font-size: 12px; color: var(--text-2); }
  .drop-text b { color: var(--accent); font-weight: 400; }
  .drop-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .drop-preview { font-size: 12px; color: var(--accent); margin-top: 6px; }

  .f-group { margin-bottom: 14px; }
  .f-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); display: block; margin-bottom: 7px; }
  .f-input, .f-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 13px; font-weight: 300;
    padding: 10px 13px; outline: none; transition: border-color 0.2s;
  }
  .f-textarea { resize: vertical; min-height: 72px; }
  .f-input:focus, .f-textarea:focus { border-color: var(--border-h); }
  .f-input::placeholder, .f-textarea::placeholder { color: var(--text-3); }
  .f-select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text-2); font-family: var(--sans); font-size: 13px;
    padding: 10px 13px; outline: none; cursor: pointer; appearance: none;
  }

  .up-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-acc {
    flex: 1; background: var(--accent); color: #111; border: none;
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 13px; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-acc:hover { opacity: 0.82; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); font-family: var(--sans); font-size: 11px;
    letter-spacing: 1px; padding: 13px 18px; cursor: pointer; transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--border-h); color: var(--text); }

  @media (max-width: 600px) {
    .modal { grid-template-columns: 1fr; }
    .modal-media { min-height: 240px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">Storno <em>bitte</em></div>
  <div class="login-hint">Nur für uns drei</div>
  <div class="login-field">
    <input class="login-pw" type="password" id="pw" placeholder="Passwort" autocomplete="off" />
    <button class="login-go" onclick="tryLogin()">Rein da</button>
    <div class="login-err" id="loginErr">Falsches Passwort.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-logo">Storno <em>bitte</em></div>
    <div class="h-avatars">
      <div class="avatar" title="Du">Du</div>
      <div class="avatar" title="Freund 1">F1</div>
      <div class="avatar" title="Freund 2">F2</div>
    </div>
    <button class="h-btn" onclick="openUpload()">+ Moment</button>
  </header>

  <div class="filters">
    <button class="f-btn on" onclick="filterBy('alle',this)">Alle</button>
    <button class="f-btn" onclick="filterBy('foto',this)">📷 Fotos</button>
    <button class="f-btn" onclick="filterBy('video',this)">🎬 Videos</button>
    <button class="f-btn" onclick="filterBy('audio',this)">🎙 Audio</button>
    <button class="f-btn" onclick="filterBy('reise',this)">Reise</button>
    <button class="f-btn" onclick="filterBy('abend',this)">Abend</button>
    <button class="f-btn" onclick="filterBy('random',this)">Random</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" onclick="closeDetailOuter(event)">
  <div class="modal" id="detailModal">
    <div class="modal-media" id="detailMedia"></div>
    <div class="modal-body">
      <div class="modal-top">
        <div class="modal-avatar" id="dAvatar"></div>
        <div class="modal-meta">
          <div class="modal-author" id="dAuthor"></div>
          <div class="modal-date" id="dDate"></div>
        </div>
        <div class="modal-tag" id="dTag"></div>
        <button class="modal-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="modal-title" id="dTitle"></div>
      <div class="modal-desc" id="dDesc"></div>

      <div class="comments-area">
        <div class="c-label">Kommentare</div>
        <div id="dComments"></div>
      </div>

      <!-- COMMENT INPUT -->
      <div class="add-c">
        <!-- recording status -->
        <div class="rec-status" id="recStatus">
          <div class="rec-dot"></div>
          <span>Aufnahme läuft...</span>
          <span class="rec-timer" id="recTimer">0:00</span>
        </div>

        <!-- voice preview -->
        <div class="voice-preview" id="voicePreview">
          <span class="vp-label">🎙 Sprachnotiz bereit</span>
          <button class="vp-discard" onclick="discardVoice()">✕</button>
          <button class="vp-send" onclick="sendVoiceComment()">Senden</button>
        </div>

        <!-- text + buttons row -->
        <div class="add-c-row">
          <input class="c-input" type="text" id="cInput" placeholder="Kommentar schreiben..." />
          <button class="voice-btn" id="voiceBtn" onclick="toggleRecording()" title="Sprachnotiz aufnehmen">🎙</button>
          <button class="c-send" onclick="submitTextComment()" title="Senden">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- UPLOAD OVERLAY -->
<div class="up-overlay" id="upOverlay" onclick="closeUploadOuter(event)">
  <div class="up-modal">
    <div class="up-title">Neuer Moment</div>
    <div class="up-sub">Foto, Video oder Sprachnotiz – rein damit.</div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()">
      <div class="drop-icon">📎</div>
      <div class="drop-text">Datei hier reinziehen oder <b>auswählen</b></div>
      <div class="drop-sub">JPG · PNG · MP4 · MOV · MP3 · M4A · WAV</div>
      <div class="drop-preview" id="dropPreview"></div>
    </div>
    <input type="file" id="fileIn" accept="image/*,video/*,audio/*" style="display:none" onchange="onFileSelect(this)"/>
    <div class="f-group">
      <label class="f-label">Titel</label>
      <input class="f-input" type="text" id="uTitle" placeholder="Wie heißt der Moment?" />
    </div>
    <div class="f-group">
      <label class="f-label">Geschichte</label>
      <textarea class="f-textarea" id="uDesc" placeholder="Was war das besondere..."></textarea>
    </div>
    <div class="f-group">
      <label class="f-label">Wer bist du?</label>
      <select class="f-select" id="uAuthor">
        <option value="Du">Du</option>
        <option value="F1">F1</option>
        <option value="F2">F2</option>
      </select>
    </div>
    <div class="f-group">
      <label class="f-label">Kategorie</label>
      <input class="f-input" type="text" id="uTag" placeholder="Reise, Abend, Random..." />
    </div>
    <div class="up-actions">
      <button class="btn-ghost" onclick="closeUpload()">Abbrechen</button>
      <button class="btn-acc" onclick="saveMemory()">Speichern</button>
    </div>
  </div>
</div>

<script>
const PW = "stornobitte";

// ── DATA ────────────────────────────────────────────────────
let data = [
  {
    id: 1, type: "foto", tag: "Abend",
    title: "Das Konzert das keiner mehr vergisst",
    desc: "Drei Stunden Regen, null Beschwerden. Irgendwie war genau das der Abend der alles zusammengebracht hat.",
    author: "Du", date: "14. März 2024",
    src: "https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=800&q=80",
    comments: [
      { type: "text", author: "F1", text: "Die Setlist war Wahnsinn ehrlich" },
      { type: "text", author: "F2", text: "Nie wieder ohne Regenjacke 😭" }
    ]
  },
  {
    id: 2, type: "foto", tag: "Reise",

    desc: "Hoffnungslos verfahren und dabei die beste Pasteis de Nata der Stadtgeschichte gefunden.",
    author: "F1", date: "2. Aug 2023",
    src: "https://images.unsplash.com/photo-1555881400-74d7acaacd8b?w=800&q=80",
    comments: [
      { type: "text", author: "Du", text: "Ich träume noch davon 😩" }
    ]
  },
  {
    id: 3, type: "foto", tag: "Abend",
    title: "Hausparty bis 7 Uhr",
    desc: "Niemand wollte anfangen und plötzlich wollte niemand aufhören.",
    author: "F2", date: "9. Nov 2023",
    src: "https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?w=800&q=80",
    comments: [
      { type: "text", author: "F1", text: "Das Rührei um halb acht war Gourmet" },
      { type: "voice", author: "Du", duration: "0:08", src: null }
    ]
  },
  {
    id: 4, type: "foto", tag: "Random",
    title: "Dieser Sonnenuntergang",
    desc: "Keiner hat geredet. Das war eigentlich genug.",
    author: "F1", date: "22. Jun 2023",
    src: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80",
    comments: []
  },
  {
    id: 5, type: "audio", tag: "Random",
    title: "Voicemail nach der Nacht",
    desc: "F2 hat um 6:47 Uhr eine Sprachnotiz geschickt.",
    author: "F2", date: "10. Nov 2023",
    src: null, duration: "0:43",
    comments: [{ type: "text", author: "Du", text: "Legendär für immer" }]
  },
  {
    id: 6, type: "foto", tag: "Reise",
    title: "Ankunft irgendwo",
    desc: "Der Moment wo der Zug hält und man noch nicht weiß was kommt.",
    author: "Du", date: "3. Aug 2023",
    src: "https://images.unsplash.com/photo-1474487548417-781cb71495f3?w=800&q=80",
    comments: []
  },
  {
    id: 7, type: "foto", tag: "Abend",
    title: "Der Moment kurz davor",
    desc: "30 Sekunden bevor alles eskaliert ist. Zeitdokument.",
    author: "F1", date: "9. Nov 2023",
    src: "https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=800&q=80",
    comments: [{ type: "text", author: "F2", text: "ICH KENNE DIESEN GESICHTSAUSDRUCK 😂" }]
  },
  {
    id: 8, type: "foto", tag: "Random",
    title: "Mitternachtsspaziergang",
    desc: "Keine Ahnung wie wir da gelandet sind. Aber gut wars.",
    author: "F2", date: "15. Jan 2024",
    src: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80",
    comments: []
  },
  {
    id: 9, type: "audio", tag: "Reise",
    title: "Sounds vom Markt in Lissabon",
    desc: "Aufgenommen zwischen Tag zwei und dem besten Essen des Jahres.",
    author: "F1", date: "2. Aug 2023",
    src: null, duration: "1:12",
    comments: []
  }
];

let activeId = null;
let currentFilter = 'alle';
let pendingFile = null;

// ── VOICE RECORDING STATE ────────────────────────────────────
let mediaRecorder = null;
let audioChunks = [];
let recordingBlob = null;
let recTimerInterval = null;
let recSeconds = 0;
let isRecording = false;

// ── LOGIN ────────────────────────────────────────────────────
function tryLogin() {
  if (document.getElementById('pw').value.toLowerCase() === PW) {
    document.getElementById('loginScreen').classList.add('out');
    setTimeout(() => {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').classList.add('on');
      renderGrid();
    }, 500);
  } else {
    const e = document.getElementById('loginErr');
    e.classList.add('on');
    setTimeout(() => e.classList.remove('on'), 2200);
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

// ── GRID ─────────────────────────────────────────────────────
function typeIcon(type) {
  if (type === 'video') return '🎬';
  if (type === 'audio') return '🎙';
  return '';
}

function renderGrid(filter) {
  const grid = document.getElementById('grid');
  const f = filter || currentFilter;
  let items = data;
  if (f === 'foto') items = data.filter(d => d.type === 'foto');
  else if (f === 'video') items = data.filter(d => d.type === 'video');
  else if (f === 'audio') items = data.filter(d => d.type === 'audio');
  else if (f !== 'alle') items = data.filter(d => d.tag.toLowerCase() === f);

  if (items.length === 0) {
    grid.innerHTML = '<div class="grid-empty">Noch nichts hier. Lad was hoch.</div>';
    return;
  }

  grid.innerHTML = items.map(m => {
    if (m.type === 'audio') return `
      <div class="tile audio-tile" onclick="openDetail(${m.id})">
        <div class="audio-icon">🎙</div>
        <div class="audio-title">${m.title}</div>
        <div class="audio-dur">${m.duration || '—'}</div>
      </div>`;
    const icon = typeIcon(m.type);
    return `
      <div class="tile" onclick="openDetail(${m.id})">
        <img src="${m.src}" alt="${m.title}" loading="lazy" onerror="this.style.opacity='0.1'" />
        ${icon ? `<div class="tile-badge">${icon}</div>` : ''}
        <div class="tile-hover">
          <div class="tile-hover-title">${m.title}</div>
          <div class="tile-hover-date">${m.date}</div>
        </div>
      </div>`;
  }).join('');
}

function filterBy(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid(tag);
}

// ── DETAIL ───────────────────────────────────────────────────
function openDetail(id) {
  activeId = id;
  const m = data.find(d => d.id === id);
  if (!m) return;

  const media = document.getElementById('detailMedia');
  if (m.type === 'audio') {
    media.className = 'modal-media audio-panel';
    media.innerHTML = `
      <div class="modal-audio-icon">🎙</div>
      <div style="font-size:13px;color:var(--text-2);text-align:center;">${m.title}</div>
      ${m.src ? `<audio class="modal-audio-player" controls src="${m.src}"></audio>` : '<div style="font-size:12px;color:var(--text-3);">Audio kommt in Phase 2</div>'}`;
  } else {
    media.className = 'modal-media';
    media.innerHTML = `<img src="${m.src}" alt="${m.title}" />`;
  }

  document.getElementById('dAvatar').textContent = m.author.substring(0,2);
  document.getElementById('dAuthor').textContent = m.author;
  document.getElementById('dDate').textContent = m.date;
  document.getElementById('dTag').textContent = m.tag;
  document.getElementById('dTitle').textContent = m.title;
  document.getElementById('dDesc').textContent = m.desc || '';

  resetVoiceUI();
  renderComments(m);

  document.getElementById('detailOverlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function renderComments(m) {
  const el = document.getElementById('dComments');
  if (!m.comments.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-3);padding:4px 0;">Noch keine Kommentare.</div>';
    return;
  }
  el.innerHTML = m.comments.map((c, i) => {
    if (c.type === 'voice') {
      const bars = Array.from({length: 20}, (_,j) => {
        const h = 20 + Math.sin(j * 1.3 + i) * 14 + Math.random() * 8;
        return `<div class="c-waveform-bar" style="height:${Math.round(h)}%"></div>`;
      }).join('');
      return `
        <div class="comment">
          <div class="c-av">${c.author.substring(0,2)}</div>
          <div style="flex:1">
            <div class="c-name">${c.author}</div>
            <div class="c-audio-wrap">
              <button class="c-play-btn" onclick="playVoiceComment(this, ${JSON.stringify(c.src || null)})">▶</button>
              <div class="c-waveform">${bars}</div>
              <span class="c-audio-dur">${c.duration || '—'}</span>
            </div>
          </div>
        </div>`;
    }
    return `
      <div class="comment">
        <div class="c-av">${c.author.substring(0,2)}</div>
        <div>
          <div class="c-name">${c.author}</div>
          <div class="c-text">${c.text}</div>
        </div>
      </div>`;
  }).join('');
}

function closeDetailOuter(e) { if (e.target === document.getElementById('detailOverlay')) closeDetail(); }
function closeDetail() {
  stopRecording();
  document.getElementById('detailOverlay').classList.remove('on');
  document.body.style.overflow = '';
  activeId = null;
}

// ── TEXT COMMENT ─────────────────────────────────────────────
function submitTextComment() {
  const input = document.getElementById('cInput');
  const text = input.value.trim();
  if (!text || activeId === null) return;
  const m = data.find(d => d.id === activeId);
  if (!m) return;
  m.comments.push({ type: 'text', author: 'Du', text });
  input.value = '';
  renderComments(m);
  renderGrid();
}
document.getElementById('cInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitTextComment(); });

// ── VOICE RECORDING ──────────────────────────────────────────
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    recordingBlob = null;

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      recordingBlob = new Blob(audioChunks, { type: 'audio/webm' });
      stream.getTracks().forEach(t => t.stop());
      showVoicePreview();
    };

    mediaRecorder.start();
    isRecording = true;
    recSeconds = 0;

    document.getElementById('voiceBtn').classList.add('recording');
    document.getElementById('recStatus').classList.add('on');
    document.getElementById('voicePreview').classList.remove('on');

    recTimerInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds / 60);
      const s = recSeconds % 60;
      document.getElementById('recTimer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      // auto-stop at 2 minutes
      if (recSeconds >= 120) stopRecording();
    }, 1000);

  } catch (err) {
    alert('Mikrofon-Zugriff verweigert. Bitte in den Browser-Einstellungen erlauben.');
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(recTimerInterval);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  document.getElementById('voiceBtn').classList.remove('recording');
  document.getElementById('recStatus').classList.remove('on');
}

function showVoicePreview() {
  document.getElementById('voicePreview').classList.add('on');
  document.getElementById('cInput').placeholder = 'Sprachnotiz bereit zum Senden...';
}

function discardVoice() {
  recordingBlob = null;
  resetVoiceUI();
}

function resetVoiceUI() {
  recordingBlob = null;
  isRecording = false;
  clearInterval(recTimerInterval);
  recSeconds = 0;
  document.getElementById('voiceBtn').classList.remove('recording');
  document.getElementById('recStatus').classList.remove('on');
  document.getElementById('voicePreview').classList.remove('on');
  document.getElementById('recTimer').textContent = '0:00';
  document.getElementById('cInput').placeholder = 'Kommentar schreiben...';
}

function sendVoiceComment() {
  if (!recordingBlob || activeId === null) return;
  const m = data.find(d => d.id === activeId);
  if (!m) return;

  const src = URL.createObjectURL(recordingBlob);
  const mins = Math.floor(recSeconds / 60);
  const secs = recSeconds % 60;
  const duration = `${mins}:${secs.toString().padStart(2,'0')}`;

  m.comments.push({ type: 'voice', author: 'Du', src, duration });
  resetVoiceUI();
  renderComments(m);
  renderGrid();
}

function playVoiceComment(btn, src) {
  if (!src) { btn.textContent = '⚠'; setTimeout(() => btn.textContent = '▶', 1500); return; }
  const audio = new Audio(src);
  btn.textContent = '■';
  audio.play();
  audio.onended = () => { btn.textContent = '▶'; };
  btn.onclick = () => { audio.pause(); btn.textContent = '▶'; btn.onclick = () => playVoiceComment(btn, src); };
}

// ── UPLOAD ───────────────────────────────────────────────────
function openUpload() { document.getElementById('upOverlay').classList.add('on'); document.body.style.overflow = 'hidden'; }
function closeUpload() {
  document.getElementById('upOverlay').classList.remove('on');
  document.body.style.overflow = '';
  pendingFile = null;
  document.getElementById('dropPreview').textContent = '';
  ['uTitle','uTag'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('uDesc').value = '';
  document.getElementById('fileIn').value = '';
}
function closeUploadOuter(e) { if (e.target === document.getElementById('upOverlay')) closeUpload(); }

function onFileSelect(input) {
  const f = input.files[0];
  if (!f) return;
  pendingFile = f;
  document.getElementById('dropPreview').textContent = f.name;
}

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  pendingFile = f;
  document.getElementById('dropPreview').textContent = f.name;
});

function getType(file) {
  if (!file) return 'foto';
  if (file.type.startsWith('video')) return 'video';
  if (file.type.startsWith('audio')) return 'audio';
  return 'foto';
}

function saveMemory() {
  const title = document.getElementById('uTitle').value.trim();
  if (!title) { document.getElementById('uTitle').focus(); return; }
  const type = getType(pendingFile);
  const src = pendingFile ? URL.createObjectURL(pendingFile) : null;
  const now = new Date();
  const dateStr = now.toLocaleDateString('de-DE', { day:'numeric', month:'short', year:'numeric' });
  data.unshift({
    id: Date.now(), type, title,
    desc: document.getElementById('uDesc').value.trim(),
    author: document.getElementById('uAuthor').value,
    tag: document.getElementById('uTag').value.trim() || 'Random',
    date: dateStr, src,
    duration: type === 'audio' ? '—' : undefined,
    comments: []
  });
  closeUpload();
  renderGrid();
}
</script>
