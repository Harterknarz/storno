<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storno bitte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111110; --bg2: #1a1a18; --bg3: #242422;
    --border: rgba(255,255,255,0.07); --border-h: rgba(255,255,255,0.14);
    --text: #e8e6e0; --text-2: #8a8880; --text-3: #3d3d3a;
    --accent: #c8a96e; --accent-bg: rgba(200,169,110,0.1);
    --red: #c0504a; --red-bg: rgba(192,80,74,0.12);
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', sans-serif; --gap: 3px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body::after { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.025; pointer-events: none; z-index: 9999; }

  /* LOGIN */
  #loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 900; transition: opacity 0.5s ease, transform 0.5s ease; }
  #loginScreen.out { opacity: 0; transform: translateY(-16px); pointer-events: none; }
  .login-logo { font-family: var(--serif); font-size: 48px; letter-spacing: -1px; margin-bottom: 4px; }
  .login-logo em { color: var(--accent); font-style: italic; }
  .login-hint { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-3); margin-bottom: 44px; }
  .login-field { display: flex; flex-direction: column; gap: 8px; width: 260px; }
  .login-name { background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 14px; padding: 13px 16px; outline: none; transition: border-color 0.2s; }
  .login-name:focus { border-color: var(--accent); }
  .login-name::placeholder { color: var(--text-3); font-size: 13px; }
  .login-pw { background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 14px; padding: 13px 16px; outline: none; letter-spacing: 2px; transition: border-color 0.2s; }
  .login-pw::placeholder { letter-spacing: 1px; color: var(--text-3); font-size: 13px; }
  .login-pw:focus { border-color: var(--accent); }
  .login-go { background: var(--accent); color: #111; border: none; font-family: var(--sans); font-size: 11px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; padding: 13px; cursor: pointer; transition: opacity 0.15s; }
  .login-go:hover { opacity: 0.82; }
  .login-go:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-err { font-size: 12px; color: #b06060; text-align: center; opacity: 0; transition: opacity 0.2s; letter-spacing: 0.5px; min-height: 16px; }
  .login-err.on { opacity: 1; }

  /* APP */
  #app { display: none; animation: fadeIn 0.5s ease; }
  #app.on { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* HEADER */
  header { position: sticky; top: 0; z-index: 100; background: rgba(17,17,16,0.9); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); height: 58px; display: flex; align-items: center; padding: 0 20px; gap: 16px; }
  .h-logo { font-family: var(--serif); font-size: 20px; letter-spacing: -0.5px; flex: 1; }
  .h-logo em { color: var(--accent); font-style: italic; }
  .h-avatars { display: flex; gap: 5px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--text-2); cursor: default; transition: border-color 0.15s, color 0.15s; }
  .avatar.me { border-color: var(--accent); color: var(--accent); }
  .h-btn { background: transparent; border: 1px solid var(--border); color: var(--text-2); font-family: var(--sans); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; padding: 7px 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .h-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* FILTERS */
  .filters { display: flex; gap: 6px; padding: 14px 20px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .f-btn { background: transparent; border: 1px solid var(--border); color: var(--text-2); font-family: var(--sans); font-size: 11px; padding: 5px 14px; cursor: pointer; white-space: nowrap; transition: all 0.15s; letter-spacing: 0.5px; border-radius: 999px; }
  .f-btn:hover, .f-btn.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); padding: var(--gap); }
  .tile { aspect-ratio: 1; position: relative; overflow: hidden; background: var(--bg2); cursor: pointer; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease, filter 0.3s; filter: brightness(0.9); }
  .tile:hover img { transform: scale(1.04); filter: brightness(0.72); }
  .tile-badge { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; z-index: 2; }
  .tile-hover { position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; opacity: 0; transition: opacity 0.25s; z-index: 1; }
  .tile:hover .tile-hover { opacity: 1; }
  .tile-hover-title { font-family: var(--serif); font-size: 15px; text-align: center; color: white; line-height: 1.3; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  .tile-hover-date { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; letter-spacing: 0.5px; }
  .tile.audio-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); }
  .audio-icon { font-size: 28px; opacity: 0.4; transition: opacity 0.2s; }
  .tile.audio-tile:hover .audio-icon { opacity: 0.8; }
  .audio-title { font-size: 11px; color: var(--text-3); text-align: center; padding: 0 12px; line-height: 1.4; transition: color 0.2s; }
  .tile.audio-tile:hover .audio-title { color: var(--text-2); }
  .audio-dur { font-size: 10px; color: var(--accent); opacity: 0.6; font-family: monospace; }
  .grid-empty { grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--text-3); font-size: 13px; letter-spacing: 1px; }
  .grid-loading { grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--text-3); font-size: 13px; letter-spacing: 2px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* DETAIL OVERLAY */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .overlay.on { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border: 1px solid var(--border); width: 100%; max-width: 860px; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; transform: scale(0.96); transition: transform 0.3s; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
  .overlay.on .modal { transform: scale(1); }
  .modal-media { position: relative; background: #000; min-height: 320px; display: flex; align-items: center; justify-content: center; }
  .modal-media img { width: 100%; height: 100%; object-fit: contain; display: block; max-height: 70vh; }
  .modal-media.audio-panel { flex-direction: column; gap: 16px; background: var(--bg3); padding: 40px 30px; }
  .modal-audio-icon { font-size: 48px; opacity: 0.3; }
  .modal-audio-player { width: 100%; accent-color: var(--accent); }
  .modal-body { display: flex; flex-direction: column; padding: 28px 24px; gap: 16px; overflow-y: auto; }
  .modal-top { display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .modal-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--text-2); flex-shrink: 0; }
  .modal-meta { flex: 1; }
  .modal-author { font-size: 13px; font-weight: 500; }
  .modal-date { font-size: 11px; color: var(--text-2); margin-top: 1px; }
  .modal-tag { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); background: var(--accent-bg); padding: 3px 10px; border-radius: 2px; }
  .modal-close { background: transparent; border: none; color: var(--text-2); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-title { font-family: var(--serif); font-size: 26px; letter-spacing: -0.5px; line-height: 1.2; }
  .modal-desc { font-size: 14px; line-height: 1.75; color: rgba(232,230,224,0.6); }

  /* COMMENTS */
  .comments-area { display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; }
  .c-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); }
  .comment { display: flex; gap: 9px; align-items: flex-start; }
  .c-av { width: 22px; height: 22px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); font-size: 9px; font-weight: 500; color: var(--text-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .c-name { font-size: 11px; font-weight: 500; color: var(--text-2); margin-bottom: 2px; }
  .c-text { font-size: 13px; color: rgba(232,230,224,0.55); line-height: 1.5; }
  .c-audio-wrap { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); padding: 8px 12px; border-radius: 2px; margin-top: 2px; }
  .c-play-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-bg); border: 1px solid var(--accent); color: var(--accent); font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .c-play-btn:hover { background: var(--accent); color: #111; }
  .c-waveform { flex: 1; height: 24px; display: flex; align-items: center; gap: 2px; }
  .c-waveform-bar { flex: 1; background: var(--border-h); border-radius: 1px; min-width: 2px; }
  .c-audio-dur { font-size: 11px; color: var(--text-3); font-family: monospace; flex-shrink: 0; }

  /* COMMENT INPUT */
  .add-c { border-top: 1px solid var(--border); padding-top: 14px; margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
  .add-c-row { display: flex; gap: 8px; align-items: center; }
  .c-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; font-weight: 300; padding: 9px 12px; outline: none; transition: border-color 0.2s; }
  .c-input:focus { border-color: var(--border-h); }
  .c-input::placeholder { color: var(--text-3); }
  .c-send { background: transparent; border: 1px solid var(--border); color: var(--text-2); font-size: 14px; width: 38px; height: 38px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .c-send:hover { border-color: var(--accent); color: var(--accent); }
  .voice-btn { width: 38px; height: 38px; flex-shrink: 0; background: transparent; border: 1px solid var(--border); color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
  .voice-btn:hover { border-color: var(--accent); color: var(--accent); }
  .voice-btn.recording { background: var(--red-bg); border-color: var(--red); color: var(--red); animation: recPulse 1s ease-in-out infinite; }
  @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,80,74,0.4)} 50%{box-shadow:0 0 0 6px rgba(192,80,74,0)} }
  .rec-status { display: none; align-items: center; gap: 8px; font-size: 12px; color: var(--red); letter-spacing: 0.5px; }
  .rec-status.on { display: flex; }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: recPulse 1s ease-in-out infinite; }
  .rec-timer { font-family: monospace; font-size: 12px; color: var(--text-2); margin-left: auto; }
  .voice-preview { display: none; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); padding: 8px 12px; }
  .voice-preview.on { display: flex; }
  .vp-label { font-size: 12px; color: var(--text-2); flex: 1; }
  .vp-send { background: var(--accent); color: #111; border: none; font-family: var(--sans); font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 7px 14px; cursor: pointer; transition: opacity 0.15s; }
  .vp-send:hover { opacity: 0.82; }
  .vp-discard { background: transparent; border: 1px solid var(--border); color: var(--text-2); font-size: 11px; padding: 7px 10px; cursor: pointer; transition: all 0.15s; }
  .vp-discard:hover { border-color: var(--red); color: var(--red); }

  /* UPLOAD */
  .up-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .up-overlay.on { opacity: 1; pointer-events: all; }
  .up-modal { background: var(--bg2); border: 1px solid var(--border); width: 100%; max-width: 460px; padding: 36px; transform: translateY(12px); transition: transform 0.3s; max-height: 90vh; overflow-y: auto; }
  .up-overlay.on .up-modal { transform: translateY(0); }
  .up-title { font-family: var(--serif); font-size: 26px; letter-spacing: -0.5px; margin-bottom: 4px; }
  .up-sub { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }
  .drop-zone { border: 1px dashed var(--border-h); padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 16px; }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: var(--accent-bg); }
  .drop-icon { font-size: 24px; margin-bottom: 8px; }
  .drop-text { font-size: 12px; color: var(--text-2); }
  .drop-text b { color: var(--accent); font-weight: 400; }
  .drop-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .drop-preview { font-size: 12px; color: var(--accent); margin-top: 6px; }
  .f-group { margin-bottom: 14px; }
  .f-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); display: block; margin-bottom: 7px; }
  .f-input, .f-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; font-weight: 300; padding: 10px 13px; outline: none; transition: border-color 0.2s; }
  .f-textarea { resize: vertical; min-height: 72px; }
  .f-input:focus, .f-textarea:focus { border-color: var(--border-h); }
  .f-input::placeholder, .f-textarea::placeholder { color: var(--text-3); }
  .up-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-acc { flex: 1; background: var(--accent); color: #111; border: none; font-family: var(--sans); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 13px; cursor: pointer; transition: opacity 0.15s; }
  .btn-acc:hover { opacity: 0.82; }
  .btn-acc:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-2); font-family: var(--sans); font-size: 11px; letter-spacing: 1px; padding: 13px 18px; cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { border-color: var(--border-h); color: var(--text); }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--border); color: var(--text-2); font-size: 13px; padding: 10px 20px; z-index: 9000; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; letter-spacing: 0.5px; }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* DELETE */
  .delete-btn { background: transparent; border: 1px solid var(--border); color: var(--text-3); font-family: var(--sans); font-size: 12px; padding: 7px 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; align-self: flex-start; }
  .delete-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  /* LOGOUT */
  .h-logout { background: transparent; border: 1px solid var(--border); color: var(--text-3); font-size: 16px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .h-logout:hover { border-color: var(--red); color: var(--red); }

  /* VOICE RECORD BUTTON */
  .voice-record-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(200,169,110,0.06); border: 1px dashed rgba(200,169,110,0.3); color: var(--accent); font-family: var(--sans); font-size: 13px; padding: 12px 16px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; margin-top: 2px; }
  .voice-record-btn:hover { background: var(--accent-bg); border-color: var(--accent); }
  .voice-record-btn.recording { background: var(--red-bg); border-color: var(--red); border-style: solid; color: var(--red); animation: recPulse 1s ease-in-out infinite; }
  .vrb-icon { font-size: 18px; }
  .vrb-label { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

  /* ── MOBILE ─────────────────────────────────────────────── */
  @media (max-width: 600px) {

    /* Login */
    .login-logo { font-size: 36px; }
    .login-field { width: 88vw; }
    .login-name, .login-pw { font-size: 16px; padding: 15px 16px; } /* 16px verhindert Auto-Zoom auf iOS */
    .login-go { padding: 16px; font-size: 13px; }

    /* Header */
    header { padding: 0 14px; height: 52px; }
    .h-logo { font-size: 17px; }
    .h-btn { padding: 8px 12px; font-size: 10px; }
    .avatar { width: 26px; height: 26px; font-size: 9px; }

    /* Filter */
    .filters { padding: 10px 14px; gap: 6px; }
    .f-btn { padding: 7px 14px; font-size: 12px; } /* größere Touch-Targets */

    /* Grid – 2 Spalten auf sehr kleinen Screens */
    @media (max-width: 400px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Detail Modal – alles untereinander */
    .modal {
      grid-template-columns: 1fr;
      max-height: 100vh;
      height: 100dvh; /* dynamic viewport height – wichtig auf iOS Safari */
      border-radius: 0;
      border: none;
    }

    .modal-media {
      min-height: 220px;
      max-height: 40vh;
    }

    .modal-media img {
      max-height: 40vh;
    }

    .modal-body {
      padding: 18px 16px;
      gap: 12px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* smooth scroll auf iOS */
    }

    .modal-title { font-size: 20px; }
    .modal-desc { font-size: 13px; }

    /* Größere Touch-Targets für Kommentar-Buttons */
    .c-send, .voice-btn {
      width: 44px;
      height: 44px;
      font-size: 16px;
    }

    .c-input { font-size: 16px; padding: 11px 12px; } /* 16px verhindert Auto-Zoom */

    .modal-close {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Upload Modal */
    .up-modal {
      padding: 24px 18px;
      max-height: 95vh;
      border-radius: 0;
      width: 100%;
    }

    .up-overlay {
      align-items: flex-end; /* Modal kommt von unten – natürlicher auf Mobile */
      padding: 0;
    }

    .up-title { font-size: 22px; }
    .f-input, .f-textarea { font-size: 16px; padding: 13px; } /* 16px Auto-Zoom Fix */
    .f-select { font-size: 16px; }

    .drop-zone { padding: 20px; }

    .btn-acc, .btn-ghost { padding: 15px; font-size: 12px; }

    /* Overlay nimmt ganzen Screen */
    .overlay { padding: 0; align-items: flex-end; }

    /* Toast weiter oben damit er nicht hinter Tastatur verschwindet */
    .toast { bottom: 80px; }

    /* Sprachaufnahme Status */
    .rec-status { font-size: 13px; }
    .vp-send { padding: 10px 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">Storno <em>bitte</em></div>
  <div class="login-field" style="margin-top:0">
    <input class="login-name" type="text" id="loginName" placeholder="Dein Name" autocomplete="off" />
    <input class="login-pw" type="password" id="loginPw" placeholder="Passwort" autocomplete="off" />
    <button class="login-go" id="loginBtn" onclick="tryLogin()">STORNO</button>
    <div class="login-err" id="loginErr">Falscher Name oder Passwort.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-logo">Storno <em>bitte</em></div>

</div>

<!-- UPLOAD OVERLAY -->
<div class="up-overlay" id="upOverlay" onclick="closeUploadOuter(event)">
  <div class="up-modal">
    <div class="up-title">Neuer Moment</div>
    <div class="up-sub">Foto, Video oder Audio – rein damit.</div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()">
      <div class="drop-icon">📎</div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://bdpziovadbsaemymkgfv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkcHppb3ZhZGJzYWVteW1rZ2Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MDIwMDcsImV4cCI6MjA5MzA3ODAwN30.h7VNa1zd0BPuoHktkjxtX-LzxtMMkOu8JH06BgAURxE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = localStorage.getItem('storno_user') || null;
let activeId = null;
let currentFilter = 'alle';
let pendingFile = null;
let mediaRecorder = null;
let audioChunks = [];
let recordingBlob = null;
let recTimerInterval = null;
let recSeconds = 0;
let isRecording = false;
let allMoments = [];

if (currentUser) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('on');
  const initials = { 'Marc': 'Ma', 'Paula': 'Pa', 'Mario': 'Mo' };
  document.querySelectorAll('.avatar').forEach(a => {
    if (a.textContent === (initials[currentUser] || currentUser.substring(0,2))) a.classList.add('me');
  });
  loadMoments();
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), duration);
}

// ── LOGIN ────────────────────────────────────────────────────
async function tryLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pw = document.getElementById('loginPw').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  if (!name || !pw) { err.classList.add('on'); return; }
  btn.disabled = true; btn.textContent = '...';

  const { data, error } = await sb.rpc('check_password', { p_name: name, p_password: pw });

  if (error || !data) {
    err.classList.add('on');
    btn.disabled = false; btn.textContent = 'Rein da';
    setTimeout(() => err.classList.remove('on'), 2500);
    return;
  }

  currentUser = name;
  localStorage.setItem('storno_user', name);
  document.getElementById('loginScreen').classList.add('out');
  setTimeout(() => {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('on');
    const initials = { 'Marc': 'Ma', 'Paula': 'Pa', 'Mario': 'Mo' };
    document.querySelectorAll('.avatar').forEach(a => {
      if (a.textContent === (initials[name] || name.substring(0,2))) a.classList.add('me');
    });
    loadMoments();
  }, 500);
}

document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('loginName').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPw').focus(); });

// ── LOGOUT ──────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('storno_user');
  currentUser = null;
  location.reload();
}

// ── MOMENTS ──────────────────────────────────────────────────
async function loadMoments() {
  const { data, error } = await sb.from('moments').select('*').order('created_at', { ascending: false });
  if (error) { showToast('Fehler beim Laden 😕'); return; }
  allMoments = data;
  renderGrid();
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('de-DE', { day: 'numeric', month: 'short', year: 'numeric' });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const f = currentFilter;
  let items = allMoments;
  if (f === 'foto') items = allMoments.filter(d => d.type === 'foto');
  else if (f === 'video') items = allMoments.filter(d => d.type === 'video');
  else if (f === 'audio') items = allMoments.filter(d => d.type === 'audio');
  else if (f !== 'alle') items = allMoments.filter(d => d.tag && d.tag.toLowerCase() === f);

  if (items.length === 0) { grid.innerHTML = '<div class="grid-empty">Noch nichts hier. Lad was hoch.</div>'; return; }

  grid.innerHTML = items.map(m => {
    if (m.type === 'audio') return `
      <div class="tile audio-tile" onclick="openDetail('${m.id}')">
        <div class="audio-icon">🎙</div>
        <div class="audio-title">${m.title}</div>
        <div class="audio-dur">${m.duration || '—'}</div>
      </div>`;
    const isVideo = m.type === 'video';
    const media = isVideo
      ? `<video src="${m.file_url || ''}" muted playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.9)"></video>`
      : `<img src="${m.file_url || ''}" alt="${m.title}" loading="lazy" onerror="this.style.opacity='0.1'" />`;
    return `
      <div class="tile" onclick="openDetail('${m.id}')">
        ${media}
        ${isVideo ? `<div class="tile-badge">🎬</div>` : ''}
        <div class="tile-hover">
          <div class="tile-hover-title">${m.title}</div>
          <div class="tile-hover-date">${formatDate(m.created_at)}</div>
        </div>
      </div>`;
  }).join('');
}

function filterBy(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
}

// ── DETAIL ───────────────────────────────────────────────────
async function openDetail(id) {
  activeId = id;
  const m = allMoments.find(d => d.id === id);
  if (!m) return;

  const media = document.getElementById('detailMedia');
  if (m.type === 'audio') {
    media.className = 'modal-media audio-panel';
    media.innerHTML = `<div class="modal-audio-icon">🎙</div><div style="font-size:13px;color:var(--text-2);text-align:center;">${m.title}</div>${m.file_url ? `<audio class="modal-audio-player" controls src="${m.file_url}"></audio>` : '<div style="font-size:12px;color:var(--text-3);">Kein Audio</div>'}`;
  } else if (m.type === 'video') {
    media.className = 'modal-media';
    media.innerHTML = `<video src="${m.file_url || ''}" controls playsinline style="width:100%;height:100%;object-fit:contain;max-height:70vh;display:block;"></video>`;
  } else {
    media.className = 'modal-media';
    media.innerHTML = `<img src="${m.file_url || ''}" alt="${m.title}" />`;
  }

  document.getElementById('dAvatar').textContent = m.author.substring(0,2);
  document.getElementById('dAuthor').textContent = m.author;
  document.getElementById('dDate').textContent = formatDate(m.created_at);
  document.getElementById('dTag').textContent = m.tag || 'Random';
  document.getElementById('dTitle').textContent = m.title;
  document.getElementById('dDesc').textContent = m.description || '';

  // show delete button only for the author
  const deleteBtn = document.getElementById('deleteBtn');
  deleteBtn.style.display = m.author === currentUser ? 'block' : 'none';

  resetVoiceUI();
  await loadComments(id);
  document.getElementById('detailOverlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}

async function loadComments(momentId) {
  const { data, error } = await sb.from('comments').select('*').eq('moment_id', momentId).order('created_at', { ascending: true });
  if (error) return;
  const el = document.getElementById('dComments');
  if (!data || !data.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-3);padding:4px 0;">Noch keine Kommentare.</div>'; return; }
  el.innerHTML = data.map((c, i) => {
    if (c.type === 'voice') {
      const bars = Array.from({length: 20}, (_,j) => `<div class="c-waveform-bar" style="height:${Math.round(20 + Math.sin(j*1.3+i)*14)}%"></div>`).join('');
      return `<div class="comment"><div class="c-av">${c.author.substring(0,2)}</div><div style="flex:1"><div class="c-name">${c.author}</div><div class="c-audio-wrap"><button class="c-play-btn" onclick="playVoice(this,'${c.audio_url||''}')">▶</button><div class="c-waveform">${bars}</div><span class="c-audio-dur">${c.duration||'—'}</span></div></div></div>`;
    }
    return `<div class="comment"><div class="c-av">${c.author.substring(0,2)}</div><div><div class="c-name">${c.author}</div><div class="c-text">${c.content}</div></div></div>`;
  }).join('');
}

function closeDetailOuter(e) { if (e.target === document.getElementById('detailOverlay')) closeDetail(); }
function closeDetail() { stopRecording(); document.getElementById('detailOverlay').classList.remove('on'); document.body.style.overflow = ''; activeId = null; }

async function deleteMoment() {
  if (!activeId) return;
  const m = allMoments.find(d => d.id === activeId);
  if (!m) return;
  if (!confirm(`"${m.title}" wirklich löschen? Das kann nicht rückgängig gemacht werden.`)) return;

  // delete file from storage
  if (m.file_url) {
    const path = m.file_url.split('/media/')[1];
    if (path) await sb.storage.from('media').remove([path]);
  }

  // delete comments
  await sb.from('comments').delete().eq('moment_id', activeId);

  // delete moment
  const { error } = await sb.from('moments').delete().eq('id', activeId);
  if (error) { showToast('Löschen fehlgeschlagen 😕'); return; }

  showToast('Moment gelöscht');
  closeDetail();
  await loadMoments();
}

// ── TEXT COMMENT ─────────────────────────────────────────────
async function submitTextComment() {
  const input = document.getElementById('cInput');
  const text = input.value.trim();
  if (!text || !activeId) return;
  const { error } = await sb.from('comments').insert({ moment_id: activeId, author: currentUser, type: 'text', content: text });
  if (error) { showToast('Fehler beim Speichern 😕'); return; }
  input.value = '';
  await loadComments(activeId);
}
document.getElementById('cInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitTextComment(); });

// ── VOICE ────────────────────────────────────────────────────
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = []; recordingBlob = null;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { recordingBlob = new Blob(audioChunks, { type: 'audio/webm' }); stream.getTracks().forEach(t => t.stop()); document.getElementById('voicePreview').classList.add('on'); };
    mediaRecorder.start(); isRecording = true; recSeconds = 0;
    const vBtn = document.getElementById('voiceBtn');
    vBtn.classList.add('recording');
    document.getElementById('vrbLabel').textContent = 'Aufnahme stoppen';
    document.getElementById('recStatus').classList.add('on');
    recTimerInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds/60), s = recSeconds%60;
      document.getElementById('recTimer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      if (recSeconds >= 120) stopRecording();
    }, 1000);
  } catch { showToast('Mikrofon-Zugriff verweigert 🎙'); }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false; clearInterval(recTimerInterval);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  document.getElementById('voiceBtn').classList.remove('recording');
  const lbl = document.getElementById('vrbLabel');
  if (lbl) lbl.textContent = 'Sprachkommentar aufnehmen';
  document.getElementById('recStatus').classList.remove('on');
}

function discardVoice() { recordingBlob = null; resetVoiceUI(); }

function resetVoiceUI() {
  recordingBlob = null; isRecording = false; clearInterval(recTimerInterval); recSeconds = 0;
  document.getElementById('voiceBtn').classList.remove('recording');
  const lbl = document.getElementById('vrbLabel');
  if (lbl) lbl.textContent = 'Sprachkommentar aufnehmen';
  document.getElementById('recStatus').classList.remove('on');
  document.getElementById('voicePreview').classList.remove('on');
  document.getElementById('recTimer').textContent = '0:00';
}

async function sendVoiceComment() {
  if (!recordingBlob || !activeId) return;
  const filename = `voice-${Date.now()}.webm`;
  let audioUrl = null;
  const { error: upErr } = await sb.storage.from('media').upload(`comments/${filename}`, recordingBlob, { contentType: 'audio/webm' });
  if (!upErr) { const { data: ud } = sb.storage.from('media').getPublicUrl(`comments/${filename}`); audioUrl = ud.publicUrl; }
  const mins = Math.floor(recSeconds/60), secs = recSeconds%60;
  const { error } = await sb.from('comments').insert({ moment_id: activeId, author: currentUser, type: 'voice', audio_url: audioUrl, duration: `${mins}:${secs.toString().padStart(2,'0')}` });
  if (error) { showToast('Sprachnotiz konnte nicht gespeichert werden 😕'); return; }
  resetVoiceUI(); await loadComments(activeId);
}

function playVoice(btn, src) {
  if (!src) { showToast('Audio nicht verfügbar'); return; }
  const audio = new Audio(src);
  btn.textContent = '■'; audio.play();
  audio.onended = () => { btn.textContent = '▶'; };
  btn.onclick = () => { audio.pause(); btn.textContent = '▶'; btn.onclick = () => playVoice(btn, src); };
}

// ── UPLOAD ───────────────────────────────────────────────────
function openUpload() { document.getElementById('upOverlay').classList.add('on'); document.body.style.overflow = 'hidden'; }
function closeUpload() {
  document.getElementById('upOverlay').classList.remove('on'); document.body.style.overflow = '';
  pendingFile = null; document.getElementById('dropPreview').textContent = '';
  ['uTitle','uTag'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('uDesc').value = ''; document.getElementById('fileIn').value = '';
}
function closeUploadOuter(e) { if (e.target === document.getElementById('upOverlay')) closeUpload(); }

function onFileSelect(input) { const f = input.files[0]; if (!f) return; pendingFile = f; document.getElementById('dropPreview').textContent = f.name; }

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); const f = e.dataTransfer.files[0]; if (!f) return; pendingFile = f; document.getElementById('dropPreview').textContent = f.name; });

function getType(file) { if (!file) return 'foto'; if (file.type.startsWith('video')) return 'video'; if (file.type.startsWith('audio')) return 'audio'; return 'foto'; }

async function saveMemory() {
  const title = document.getElementById('uTitle').value.trim();
  if (!title) { document.getElementById('uTitle').focus(); return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Lädt...';
  let fileUrl = null;
  const type = getType(pendingFile);

  if (pendingFile) {
    const ext = pendingFile.name.split('.').pop();
    const folder = type === 'foto' ? 'photos' : type === 'video' ? 'videos' : 'audio';
    const filename = `${folder}/${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage.from('media').upload(filename, pendingFile, { contentType: pendingFile.type });
    if (upErr) { showToast('Upload fehlgeschlagen 😕'); btn.disabled = false; btn.textContent = 'Speichern'; return; }
    const { data: ud } = sb.storage.from('media').getPublicUrl(filename);
    fileUrl = ud.publicUrl;
  }

  const { error } = await sb.from('moments').insert({ title, description: document.getElementById('uDesc').value.trim(), author: currentUser, tag: document.getElementById('uTag').value.trim() || 'Random', type, file_url: fileUrl });
  btn.disabled = false; btn.textContent = 'Speichern';
  if (error) { showToast('Speichern fehlgeschlagen 😕'); return; }
  showToast('Moment gespeichert ✓'); closeUpload(); await loadMoments();
}
</script>
